name: ci

on:
  push:
    branches:
      - feat-pin-sha256
      - master

env:
  DOTNET_NUGET_SIGNATURE_VERIFICATION: false

jobs:
  # ─── Windows Avalonia Desktop (x64 + arm64) ───
  build-win-desktop:
    strategy:
      matrix:
        arch: [x64, arm64]
    runs-on: ubuntu-latest
    env:
      RID: win-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: '0'
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Build Avalonia Desktop
        run: dotnet publish v2rayN/v2rayN.Desktop/v2rayN.Desktop.csproj -c Release -r $RID --self-contained -p:EnableWindowsTargeting=true -o out/${RID}
      - name: Build AmazTool
        run: dotnet publish v2rayN/AmazTool/AmazTool.csproj -c Release -r $RID --self-contained -p:PublishTrimmed=true -p:EnableWindowsTargeting=true -o out/${RID}
      - uses: actions/upload-artifact@v4
        with:
          name: v2rayN-desktop-win-${{ matrix.arch }}
          path: out/${{ env.RID }}/

  # ─── Windows WPF (x64 + arm64) ───
  build-win-wpf:
    strategy:
      matrix:
        arch: [x64, arm64]
    runs-on: ubuntu-latest
    env:
      RID: win-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: '0'
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Build WPF
        run: dotnet publish v2rayN/v2rayN/v2rayN.csproj -c Release -r $RID --self-contained -p:EnableWindowsTargeting=true -o out/${RID}
      - uses: actions/upload-artifact@v4
        with:
          name: v2rayN-wpf-win-${{ matrix.arch }}
          path: out/${{ env.RID }}/

  # ─── Linux (x64 + arm64) ───
  build-linux:
    strategy:
      matrix:
        arch: [x64, arm64]
    runs-on: ubuntu-latest
    env:
      RID: linux-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: '0'
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Build Desktop
        run: dotnet publish v2rayN/v2rayN.Desktop/v2rayN.Desktop.csproj -c Release -r $RID --self-contained -o out/${RID}
      - name: Build AmazTool
        run: dotnet publish v2rayN/AmazTool/AmazTool.csproj -c Release -r $RID --self-contained -p:PublishTrimmed=true -o out/${RID}
      - uses: actions/upload-artifact@v4
        with:
          name: v2rayN-desktop-linux-${{ matrix.arch }}
          path: out/${{ env.RID }}/

  # ─── macOS (x64 + arm64) ───
  build-macos:
    strategy:
      matrix:
        arch: [x64, arm64]
    runs-on: macos-latest
    env:
      RID: osx-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: '0'
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Build Desktop
        run: dotnet publish v2rayN/v2rayN.Desktop/v2rayN.Desktop.csproj -c Release -r $RID --self-contained -o out/${RID}
      - name: Build AmazTool
        run: dotnet publish v2rayN/AmazTool/AmazTool.csproj -c Release -r $RID --self-contained -p:PublishTrimmed=true -o out/${RID}
      - uses: actions/upload-artifact@v4
        with:
          name: v2rayN-desktop-macos-${{ matrix.arch }}
          path: out/${{ env.RID }}/
