name: build

on:
  workflow_call:
    inputs:
      target: # windows linux macos
        required: true
        type: string
      project:
        required: false
        type: string
        default: './v2rayN.Desktop/v2rayN.Desktop.csproj'

jobs:
  build:
    name: build x64 arm64
    strategy:
      matrix:
        arch: [ x64, arm64 ]
    runs-on: |-
      ${{
        case(
          inputs.target == 'macos', 'macos-latest',
          inputs.target == 'linux', 'ubuntu-24.04',
          'ubuntu-latest'
        )
      }}
    env:
      Output: "${{ github.workspace }}/${{ matrix.arch }}"
      RID: |-
        ${{
          case(
            inputs.target == 'macos', format('osx-{0}', matrix.arch),
            inputs.target == 'windows', format('win-{0}', matrix.arch),
            format('{0}-{1}', inputs.target, matrix.arch)
          )
        }}
      Project: ${{ inputs.project }}
      DOTNET_NUGET_SIGNATURE_VERIFICATION: "false"
      ExtOpt: |-
        ${{
          case(
            inputs.target == 'windows', '-p:EnableWindowsTargeting=true',
            ''
          )
        }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: 'recursive'
        fetch-depth: '0'

    - name: Setup .NET
      uses: actions/setup-dotnet@v5.3.0
      with:
        dotnet-version: '10.0.1xx'

    - name: Build v2rayN
      working-directory: ./v2rayN
      run: dotnet publish $Project -c Release -r $RID -p:SelfContained=true $ExtOpt -o $Output

    - name: Build AmazTool
      working-directory: ./v2rayN
      run: dotnet publish ./AmazTool/AmazTool.csproj -c Release -r $RID -p:SelfContained=true -p:PublishTrimmed=true $ExtOpt -o $Output

    - name: Download hy2-pin-tool
      run: |
        mkdir -p $Output/bin
        TAG=$(curl -fsSL https://api.github.com/repos/crazypeace/hysteria2-pinSHA256-tool/releases/latest | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
        echo "Latest hy2-pin-tool release: $TAG"
        # Map .NET RID to Go binary name
        case "$RID" in
          win-x64)    GO_FILE="hy2-pin-tool-windows-amd64.exe" ;;
          win-arm64)  GO_FILE="hy2-pin-tool-windows-arm64.exe" ;;
          linux-x64)  GO_FILE="hy2-pin-tool-linux-amd64" ;;
          linux-arm64) GO_FILE="hy2-pin-tool-linux-arm64" ;;
          osx-x64)    GO_FILE="hy2-pin-tool-darwin-amd64" ;;
          osx-arm64)  GO_FILE="hy2-pin-tool-darwin-arm64" ;;
          *)          echo "Unknown RID: $RID, skipping hy2-pin-tool"; exit 0 ;;
        esac
        curl -fsSL -o "$Output/bin/hy2-pin-tool" \
          "https://github.com/crazypeace/hysteria2-pinSHA256-tool/releases/download/${TAG}/${GO_FILE}"
        chmod +x "$Output/bin/hy2-pin-tool"
        ls -lh $Output/bin/

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7.0.1
      with:
        name: ${{ matrix.arch }}
        path: ${{ matrix.arch }}